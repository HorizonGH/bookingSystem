services:
  - type: web
    name: saas-booking-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__Secret
        sync: false
      - key: JwtSettings__Issuer
        value: BookingSaas
      - key: JwtSettings__Audience
        value: BookingSaasApi
      - key: JwtSettings__AccessTokenExpirationMinutes
        value: "15"
      - key: JwtSettings__RefreshTokenExpirationDays
        value: "7"
      - key: CloudinarySettings__CloudName
        sync: false
      - key: CloudinarySettings__ApiKey
        sync: false
      - key: CloudinarySettings__ApiSecret
        sync: false
